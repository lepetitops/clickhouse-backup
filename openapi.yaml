  /backup/status:
    get:
      summary: Get current operation status
      tags: [Status]
      responses:
        '200':
          description: Current operation status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActionStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /backup/actions:
    get:
      summary: Get actions log
      tags: [Actions]
      responses:
        '200':
          description: Actions log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActionStatus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    head:
      summary: Check actions endpoint
      tags: [Actions]
      responses:
        '200':
          description: Endpoint is available
        '401':
          description: Unauthorized
    post:
      summary: Execute action
      description: >
        Execute actions via JSON payload. Used for integration with ClickHouse
        system tables like system.backup_actions.
      tags: [Actions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  description: Command to execute
              example:
                command: "create backup_name"
      responses:
        '200':
          description: Action executed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    status:
                      type: string
                    operation:
                      type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /metrics:
    get:
      summary: Prometheus metrics
      tags: [System]
      description: Prometheus-formatted metrics for monitoring
      security: []
      responses:
        '200':
          description: Metrics in Prometheus format
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP clickhouse_backup_last_backup_size_local Last local backup size
                  # TYPE clickhouse_backup_last_backup_size_local gauge
                  clickhouse_backup_last_backup_size_local 1048576

  /debug/pprof/:
    get:
      summary: Go pprof debug index
      tags: [System]
      description: Go profiling debug interface (enabled when pprof is enabled)
      responses:
        '200':
          description: Pprof index page
          content:
            text/html:
              schema:
                type: string
        '401':
          description: Unauthorized

  /debug/pprof/profile:
    get:
      summary: CPU profile
      tags: [System]
      description: CPU profiling data (enabled when pprof is enabled)
      responses:
        '200':
          description: CPU profile data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized