          description: Full backup interval (e.g., "24h")
        - in: query
          name: table
          schema:
            type: string
          description: Table pattern filter
        - in: query
          name: partitions
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          description: Specific partitions to watch
        - in: query
          name: schema
          schema:
            type: boolean
          description: Watch schema only
        - in: query
          name: rbac
          schema:
            type: boolean
          description: Include RBAC in watch
        - in: query
          name: configs
          schema:
            type: boolean
          description: Include configs in watch
        - in: query
          name: skip-check-parts-columns
          schema:
            type: boolean
          description: Skip parts columns check
        - in: query
          name: skip_check_parts_columns
          schema:
            type: boolean
          description: Skip parts columns check (alternative parameter name)
        - in: query
          name: delete-source
